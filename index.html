```html
<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Poliponi Ticket</title>

<style>
* {margin:0;padding:0;box-sizing:border-box;font-family:Arial;}
body {background:#f5f6fa;color:#111;}

.header {
  display:flex;justify-content:space-between;
  padding:16px;font-weight:bold;color:#2d4cc8;
}

.steps {
  display:flex;gap:10px;padding:0 16px 16px;
  align-items:center;
}
.step {
  width:28px;height:28px;border-radius:50%;
  border:2px solid #ccc;display:flex;
  align-items:center;justify-content:center;
}
.active {border-color:#2d4cc8;color:#2d4cc8;}

.banner img {
  width:100%;border-radius:12px;
  padding:0 16px;
}

.section {padding:16px;}
h2 {margin-bottom:10px;}

.ticket {
  background:#fff;padding:16px;border-radius:14px;
  margin-bottom:12px;border:1px solid #eee;
}

.ticket-header {
  display:flex;justify-content:space-between;
}

.badge {
  font-size:12px;padding:4px 8px;
  border-radius:8px;background:#e6f0ff;
  color:#2d4cc8;
}

.ticket-body {
  display:flex;justify-content:space-between;
  margin-top:12px;align-items:center;
}

.price {font-size:18px;font-weight:bold;}

.counter {display:flex;gap:10px;align-items:center;}

.counter button {
  width:32px;height:32px;border-radius:50%;
  border:none;background:#2d4cc8;color:#fff;
  font-size:18px;cursor:pointer;
}

.summary {
  background:#fff;margin:16px;padding:16px;
  border-radius:12px;
}

.row {
  display:flex;justify-content:space-between;
  margin-bottom:8px;
}

.footer {
  position:sticky;bottom:0;background:#fff;
  padding:16px;border-top:1px solid #eee;
}

.total {
  display:flex;justify-content:space-between;
  margin-bottom:10px;font-weight:bold;
}

.buy {
  width:100%;padding:14px;
  border:none;border-radius:10px;
  background:#2d4cc8;color:#fff;
  font-size:16px;cursor:pointer;
}

.buy:disabled {background:#ccc;}
</style>
</head>

<body>

<div class="header">
  <div>Artatix</div>
  <div>🇮🇩 ID</div>
</div>

<div class="steps">
  <div class="step active">1</div>
  <span>Pilih Kategori</span>
  <div class="step">2</div>
  <div class="step">3</div>
  <div class="step">4</div>
</div>

<div class="banner">
  <img src="banner.jpg">
</div>

<div class="section">
  <h2>Kategori Tiket</h2>

  <!-- FESTIVAL -->
  <div class="ticket">
    <div class="ticket-header">
      <div>REGULAR: FESTIVAL</div>
      <div class="badge">On Sale</div>
    </div>

    <div class="ticket-body">
      <div class="price">Rp320.000</div>
      <div class="counter">
        <button onclick="dec('festival')">-</button>
        <span id="festival">0</span>
        <button onclick="inc('festival')">+</button>
      </div>
    </div>
  </div>

  <!-- PREMIUM -->
  <div class="ticket">
    <div class="ticket-header">
      <div>REGULAR: PREMIUM</div>
      <div class="badge">On Sale</div>
    </div>

    <div class="ticket-body">
      <div class="price">Rp495.000</div>
      <div class="counter">
        <button onclick="dec('premium')">-</button>
        <span id="premium">0</span>
        <button onclick="inc('premium')">+</button>
      </div>
    </div>
  </div>

  <!-- FAST TRACK -->
  <div class="ticket">
    <div class="ticket-header">
      <div>REGULAR: FAST TRACK</div>
      <div class="badge">On Sale</div>
    </div>

    <div class="ticket-body">
      <div class="price">Rp595.000</div>
      <div class="counter">
        <button onclick="dec('fast')">-</button>
        <span id="fast">0</span>
        <button onclick="inc('fast')">+</button>
      </div>
    </div>
  </div>
</div>

<div class="summary">
  <h3>Rincian Pesanan</h3>
  <div class="row">
    <span>Festival</span><span id="fTotal">Rp0</span>
  </div>
  <div class="row">
    <span>Premium</span><span id="pTotal">Rp0</span>
  </div>
  <div class="row">
    <span>Fast Track</span><span id="faTotal">Rp0</span>
  </div>
  <hr>
  <div class="row">
    <strong>Total</strong><strong id="grand">Rp0</strong>
  </div>
</div>

<div class="footer">
  <div class="total">
    <span>Total</span><span id="grand2">Rp0</span>
  </div>
  <button class="buy" id="buy" onclick="beli()" disabled>Beli Sekarang</button>
</div>

<script>
let data = {
  festival:0,
  premium:0,
  fast:0
};

const price = {
  festival:320000,
  premium:495000,
  fast:595000
};

function inc(type){
  if(data[type] < 4){
    data[type]++;
    update();
  }
}

function dec(type){
  if(data[type] > 0){
    data[type]--;
    update();
  }
}

function rupiah(num){
  return "Rp" + num.toLocaleString("id-ID");
}

function update(){
  let f = data.festival * price.festival;
  let p = data.premium * price.premium;
  let fa = data.fast * price.fast;

  let total = f + p + fa;

  document.getElementById("festival").innerText = data.festival;
  document.getElementById("premium").innerText = data.premium;
  document.getElementById("fast").innerText = data.fast;

  document.getElementById("fTotal").innerText = rupiah(f);
  document.getElementById("pTotal").innerText = rupiah(p);
  document.getElementById("faTotal").innerText = rupiah(fa);

  document.getElementById("grand").innerText = rupiah(total);
  document.getElementById("grand2").innerText = rupiah(total);

  document.getElementById("buy").disabled = total === 0;
}

function beli(){
  let total = (data.festival * price.festival) +
              (data.premium * price.premium) +
              (data.fast * price.fast);

  if(total > 0){
    let url = "https://soekarnofestrun2026-rgb.github.io/Form-Pembelian-TICKET/" +
              `?festival=${data.festival}&premium=${data.premium}&fast=${data.fast}&total=${total}`;

    window.location.href = url;
  }
}
</script>

</body>
</html>
